name: Apply Sprint 34 Payload

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sprint branch
        uses: actions/checkout@v4
        with:
          ref: codex/sprint-34-authoritative-posting-resolution

      - name: Apply implementation payload
        shell: bash
        run: |
          cat .sprint34-payload/chunk-* | base64 --decode > "$RUNNER_TEMP/sprint34.tar.gz"
          tar -xzf "$RUNNER_TEMP/sprint34.tar.gz" -C .
          rm -rf .sprint34-payload
          rm -f .github/workflows/apply-sprint34-payload.yml
          rm -f .github/workflows/sprint34-source-export.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No payload changes to commit"
            exit 0
          fi
          git commit -m "Implement Sprint 34 authoritative posting resolution"
          git push origin HEAD:codex/sprint-34-authoritative-posting-resolution
