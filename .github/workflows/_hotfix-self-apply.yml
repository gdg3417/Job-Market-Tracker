name: Temporary Hotfix Self Apply

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - agent/hotfix-quota-actions-maintenance

permissions:
  contents: write

jobs:
  apply-hotfix:
    if: github.event_name == 'push' || github.head_ref == 'agent/hotfix-quota-actions-maintenance'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      TARGET_BRANCH: ${{ github.head_ref || github.ref_name }}
    steps:
      - name: Check out hotfix branch
        uses: actions/checkout@v6
        with:
          ref: ${{ env.TARGET_BRANCH }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Prepare validated workflow blobs
        run: python scripts/_apply_hotfix.py

      - name: Validate staged changes
        run: |
          python -m compileall -q src tests
          pytest -q tests/test_jobs_integrity_quota.py tests/test_jobs_integrity_retry_scope.py
          WORKFLOW_ROOT=blob-staging pytest -q tests/test_workflow_action_versions.py
          git diff --check

      - name: Commit staged blobs and tests
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add blob-staging tests/test_jobs_integrity_retry_scope.py tests/test_workflow_action_versions.py
          git commit -m "Stage validated hotfix workflow blobs"
          git push origin HEAD:"$TARGET_BRANCH"
