name: Temporary Hotfix Self Apply

on:
  push:
    branches:
      - agent/hotfix-quota-actions-maintenance

permissions:
  contents: write

jobs:
  apply-hotfix:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out hotfix branch
        uses: actions/checkout@v6
        with:
          ref: ${{ github.ref_name }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Apply deterministic maintenance changes
        run: python scripts/_apply_hotfix.py

      - name: Validate focused changes
        run: |
          python -m compileall -q src tests
          pytest -q tests/test_jobs_integrity_quota.py tests/test_jobs_integrity_retry_scope.py tests/test_workflow_action_versions.py
          git diff --check

      - name: Commit final hotfix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Complete quota retry and action version hotfix"
          git push origin HEAD:${{ github.ref_name }}
