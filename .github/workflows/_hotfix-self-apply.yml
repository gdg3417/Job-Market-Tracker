name: Temporary Hotfix Self Apply

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - agent/hotfix-quota-actions-maintenance

permissions:
  contents: read

jobs:
  apply-hotfix:
    if: github.event_name == 'push' || github.head_ref == 'agent/hotfix-quota-actions-maintenance'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      TARGET_BRANCH: ${{ github.head_ref || github.ref_name }}
    steps:
      - name: Check out hotfix branch
        uses: actions/checkout@v6
        with:
          ref: ${{ env.TARGET_BRANCH }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Apply deterministic maintenance changes
        run: python scripts/_apply_hotfix.py

      - name: Validate focused changes
        run: |
          python -m compileall -q src tests
          pytest -q tests/test_jobs_integrity_quota.py tests/test_jobs_integrity_retry_scope.py tests/test_workflow_action_versions.py
          git diff --check

      - name: Package validated files
        run: |
          tar -czf "$RUNNER_TEMP/hotfix-files.tar.gz" \
            .github/workflows \
            src/jobs_integrity.py \
            tests/test_jobs_integrity_retry_scope.py \
            tests/test_workflow_action_versions.py

      - name: Upload validated files
        uses: actions/upload-artifact@v4
        with:
          name: validated-hotfix-files
          path: ${{ runner.temp }}/hotfix-files.tar.gz
          if-no-files-found: error
          retention-days: 1
