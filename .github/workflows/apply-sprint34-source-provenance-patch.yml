name: Apply Sprint 34 Source Provenance Patch

on:
  push:
    branches:
      - codex/sprint-34-authoritative-posting-resolution
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply-patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/sprint-34-authoritative-posting-resolution
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Patch source provenance filtering
        shell: python
        run: |
          from pathlib import Path

          run_path = Path("src/resolution/run.py")
          run_text = run_path.read_text()

          if "import re\n" not in run_text:
              run_text = run_text.replace("import json\n", "import json\nimport re\n", 1)
          if "from rapidfuzz import fuzz\n" not in run_text:
              run_text = run_text.replace("from bs4 import BeautifulSoup\n", "from bs4 import BeautifulSoup\nfrom rapidfuzz import fuzz\n", 1)

          helper = '''\n\ndef _match_text(value: Any) -> str:\n    text = str(value or "").lower().replace("&", " and ")\n    text = re.sub(r"\\bsr\\.?\\b", "senior", text)\n    text = re.sub(r"\\bmgr\\.?\\b", "manager", text)\n    text = re.sub(r"[^a-z0-9]+", " ", text)\n    return " ".join(text.split())\n\n\ndef _metadata_similarity(left: Any, right: Any) -> int:\n    a, b = _match_text(left), _match_text(right)\n    return int(fuzz.token_set_ratio(a, b)) if a and b else 0\n\n\ndef _source_row_matches_job(job: JobPosting, row: dict[str, Any]) -> bool:\n    source_company = str(row.get("company") or "").strip()\n    source_title = str(row.get("title") or "").strip()\n    if source_company and _metadata_similarity(job.company, source_company) < 75:\n        return False\n    if source_title and _metadata_similarity(job.title, source_title) < 70:\n        return False\n    return True\n'''
          if "def _source_row_matches_job(" not in run_text:
              marker = "\n\ndef _priority(job: JobPosting, *, target: bool, has_partial_evidence: bool) -> tuple[int, int, str]:"
              run_text = run_text.replace(marker, helper + marker, 1)

          if "job_sources = [" not in run_text:
              run_text = run_text.replace(
                  "        direct_urls: list[tuple[str, str]] = []\n        queue_item = queue_by_job.get(job.job_key, (0, None))[1]",
                  "        job_sources = [row for row in sources_by_job.get(job.job_key, []) if _source_row_matches_job(job, row)]\n        direct_urls: list[tuple[str, str]] = []\n        queue_item = queue_by_job.get(job.job_key, (0, None))[1]",
                  1,
              )
          run_text = run_text.replace(
              "*[row.get(\"canonical_url\") or row.get(\"source_url\") for row in sources_by_job.get(job.job_key, [])],",
              "*[row.get(\"canonical_url\") or row.get(\"source_url\") for row in job_sources],",
              1,
          )
          run_text = run_text.replace(
              "        for row in sources_by_job.get(job.job_key, []):\n",
              "        for row in job_sources:\n",
              1,
          )
          run_path.write_text(run_text)

          test_path = Path("tests/resolution/test_resolution_run.py")
          test_text = test_path.read_text()
          test_text = test_text.replace(
              "class FakeSheetClient:\n    def __init__(self, jobs, queue_items, company_rows=None, resolutions=None):",
              "class FakeSheetClient:\n    def __init__(self, jobs, queue_items, company_rows=None, resolutions=None, source_rows=None):",
              1,
          )
          test_text = test_text.replace(
              '            "Job_Sources": [],',
              '            "Job_Sources": [dict(row) for row in (source_rows or [])],',
              1,
          )

          regression = '''\n\ndef test_mismatched_source_rows_are_ignored_before_direct_resolution():\n    topgolf_url = "https://www.linkedin.com/jobs/view/4417965465"\n    oatly_url = "https://careers.oatly.com/job/4411969584/integrated-business-planning-lead"\n    job = sparse_job(\n        "job-a4f80647216b",\n        "Topgolf",\n        "Sr Manager, Strategic Planning",\n        "Dallas, TX",\n        topgolf_url,\n        source_job_id="linkedin-4417965465",\n    )\n    source_rows = [\n        {\n            "source_key": "src-topgolf",\n            "job_key": job.job_key,\n            "company": "Topgolf",\n            "title": "Sr Manager, Strategic Planning",\n            "source_primary": "gmail_alert",\n            "source_type": "gmail_alert",\n            "source_job_id": "linkedin-4417965465",\n            "canonical_url": topgolf_url,\n            "source_url": topgolf_url,\n            "status": "active",\n        },\n        {\n            "source_key": "src-oatly",\n            "job_key": job.job_key,\n            "company": "Oatly",\n            "title": "Integrated Business Planning Lead",\n            "source_primary": "gmail_alert",\n            "source_type": "gmail_alert",\n            "source_job_id": "linkedin-4411969584",\n            "canonical_url": oatly_url,\n            "source_url": oatly_url,\n            "status": "active",\n        },\n    ]\n    client = FakeSheetClient(\n        [job],\n        [queue_for(job)],\n        [config_row("Topgolf", "", "careers.topgolf.com")],\n        source_rows=source_rows,\n    )\n\n    class RecordingFetcher:\n        def __init__(self):\n            self.requested = []\n\n        def fetch(self, url):\n            self.requested.append(url)\n            if url == oatly_url:\n                raise AssertionError("mismatched source row should not be fetched for Topgolf")\n            raise EnrichmentFetchError("not_found", "missing test page", retryable=False, status_code=404, final_url=url)\n\n    fetcher = RecordingFetcher()\n    result = run_posting_resolution(\n        client,\n        now=NOW,\n        fetcher=fetcher,\n        ats_discovery=lambda *_args, **_kwargs: AtsDiscoveryResult("phenom", "empty"),\n        settings=ResolutionSettings(\n            direct_url_budget=10,\n            career_search_link_budget=0,\n            search_query_budget=0,\n            external_page_budget=0,\n        ),\n        priority_rules={},\n    )\n\n    assert result.not_found == 1\n    assert oatly_url not in fetcher.requested\n    assert client.tables["Posting_Resolution"][0]["resolution_state"] == "not_found"\n    assert client.tables["Enrichment_Evidence"] == []\n    assert client.tables["Resolution_Candidates"] == []\n'''
          if "test_mismatched_source_rows_are_ignored_before_direct_resolution" not in test_text:
              marker = "\n\ndef test_topgolf_and_toyota_regressions_resolve_without_job_duplication():"
              test_text = test_text.replace(marker, regression + marker, 1)
          test_path.write_text(test_text)

      - name: Commit source patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/resolution/run.py tests/resolution/test_resolution_run.py
          if git diff --cached --quiet; then
            echo "No source changes to commit."
            exit 0
          fi
          git commit -m "Patch Sprint 34 source provenance filtering"
          git push origin codex/sprint-34-authoritative-posting-resolution
