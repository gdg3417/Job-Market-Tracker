name: Job Tracker Weekly Value Refresh

on:
  workflow_dispatch:
    inputs:
      backfill_weeks:
        description: Number of weekly rows to reconstruct when history is missing
        required: false
        default: "12"
        type: string
      as_of:
        description: Optional YYYY-MM-DD data as-of date
        required: false
        default: ""
        type: string
      apply_governance:
        description: Reapply workbook governance after generated surfaces refresh
        required: false
        default: false
        type: boolean
  schedule:
    # Monday pre-email refresh. The normal daily refresh remains below.
    - cron: "0 12 * * 1"
    - cron: "15 14 * * *"

permissions:
  contents: read

concurrency:
  group: job-tracker-workbook-writes
  queue: max
  cancel-in-progress: false

jobs:
  weekly-value-refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
      GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate required secrets
        shell: bash
        run: |
          if [ -z "${GOOGLE_SHEET_ID}" ]; then
            echo "::error::Missing required GitHub Secret: GOOGLE_SHEET_ID"
            exit 1
          fi
          if [ -z "${GOOGLE_SERVICE_ACCOUNT_JSON}" ]; then
            echo "::error::Missing required GitHub Secret: GOOGLE_SERVICE_ACCOUNT_JSON"
            exit 1
          fi

      - name: Write Google credentials
        shell: bash
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          raw_value = os.environ["GOOGLE_SERVICE_ACCOUNT_JSON"]
          json.loads(raw_value)
          path = Path(os.environ["RUNNER_TEMP"]) / "google-service-account.json"
          path.write_text(raw_value, encoding="utf-8")
          path.chmod(0o600)
          with Path(os.environ["GITHUB_ENV"]).open("a", encoding="utf-8") as handle:
              handle.write(f"GOOGLE_APPLICATION_CREDENTIALS={path}\n")
          PY

      - name: Run focused tests
        run: >-
          pytest
          tests/test_weekly_value*.py
          tests/test_follow_up.py
          tests/test_weekly_context*.py
          tests/test_sheet_dates_shared.py
          tests/test_generated_surface*.py
          tests/test_presentation_refresh*.py

      - name: Refresh generated presentation surfaces
        shell: bash
        env:
          BACKFILL_WEEKS: ${{ github.event.inputs.backfill_weeks || '12' }}
          AS_OF: ${{ github.event.inputs.as_of || '' }}
          APPLY_GOVERNANCE: ${{ github.event.inputs.apply_governance || false }}
        run: |
          set -o pipefail
          args=(
            --refresh
            --source-run "weekly-value-workflow"
            --backfill-weeks "${BACKFILL_WEEKS}"
          )
          if [ -n "${AS_OF}" ]; then
            args+=(--as-of "${AS_OF}")
          fi
          if [ "${APPLY_GOVERNANCE}" = "true" ]; then
            args+=(--governance)
          fi
          python -m src.presentation_refresh "${args[@]}" | tee "$RUNNER_TEMP/presentation_refresh.json"

      - name: Write GitHub Step Summary
        if: always()
        shell: bash
        run: |
          python - <<'PY'
          import os
          from pathlib import Path

          from src.workflow_output import load_json_output

          data = load_json_output(Path(os.environ["RUNNER_TEMP"]) / "presentation_refresh.json")
          rows = [
              ("Status", data.get("status", "not_run")),
              ("Jobs snapshot rows", data.get("jobs_snapshot_rows", 0)),
              ("Surfaces succeeded", data.get("surfaces_succeeded", 0)),
              ("Surfaces failed", data.get("surfaces_failed", 0)),
              ("Surfaces with warnings", data.get("surfaces_with_warnings", 0)),
              ("Surface status written", "yes" if data.get("surface_status_written") else "no"),
              ("Dashboard rows written", data.get("dashboard_rows_written", 0)),
              ("Digest rows written", data.get("digest_rows_written", 0)),
              ("Data as-of date", data.get("data_as_of_date", "")),
          ]
          with Path(os.environ["GITHUB_STEP_SUMMARY"]).open("a", encoding="utf-8") as handle:
              handle.write("### Unified Generated Surface Refresh\n\n")
              handle.write("| Metric | Value |\n")
              handle.write("| --- | ---: |\n")
              for metric, value in rows:
                  handle.write(f"| {metric} | {value} |\n")
              failures = [
                  item for item in data.get("surface_status", [])
                  if item.get("status") != "success"
              ]
              if failures:
                  handle.write("\n#### Surface failures\n\n")
                  for item in failures:
                      handle.write(
                          f"* {item.get('surface_name', 'unknown')}: "
                          f"{item.get('warning_or_error', 'unknown error')}\n"
                      )
          PY
