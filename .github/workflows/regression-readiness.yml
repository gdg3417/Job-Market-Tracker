name: Regression readiness

on:
  pull_request:
  workflow_dispatch:

jobs:
  regression-readiness:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: pytest

      - name: Run gold-standard regression evaluation
        run: python -m src.production_readiness --evaluate-regression --fixture data/regression/sprint38_gold_standard_jobs.json
