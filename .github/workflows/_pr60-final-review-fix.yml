name: PR 60 Final Review Fix

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply-review-fix:
    if: github.head_ref == 'agent/hotfix-quota-actions-maintenance'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      TARGET_BRANCH: ${{ github.head_ref }}
    steps:
      - name: Check out hotfix branch
        uses: actions/checkout@v6
        with:
          ref: ${{ env.TARGET_BRANCH }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Apply final review fix
        run: python scripts/_pr60_final_review_fix.py

      - name: Validate focused behavior
        run: |
          python -m compileall -q src tests
          pytest -q tests/test_jobs_integrity_quota.py tests/test_jobs_integrity_retry_scope.py tests/test_workflow_action_versions.py
          git diff --check

      - name: Commit review fix
        run: |
          if git diff --quiet; then
            echo "Review fix is already applied."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/jobs_integrity.py tests/test_jobs_integrity_retry_scope.py tests/test_workflow_action_versions.py
          git commit -m "Complete final quota output regression coverage"
          git push origin HEAD:"$TARGET_BRANCH"
