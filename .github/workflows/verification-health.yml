name: Job Tracker Verification Health

on:
  workflow_run:
    workflows:
      - Job Tracker Enrichment Run
    branches:
      - main
    types:
      - completed
  workflow_dispatch:
    inputs:
      execution:
        description: Calculate only or write the workbook
        required: true
        default: run
        type: choice
        options:
          - run
          - dry-run
      run_id:
        description: Optional deterministic Runs identifier
        required: false
        default: ""
        type: string

permissions:
  contents: read

concurrency:
  group: job-tracker-verification-health
  cancel-in-progress: false

jobs:
  verification-health:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
      GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate required secrets
        shell: bash
        run: |
          if [ -z "${GOOGLE_SHEET_ID}" ]; then
            echo "::error::Missing required GitHub Secret: GOOGLE_SHEET_ID"
            exit 1
          fi
          if [ -z "${GOOGLE_SERVICE_ACCOUNT_JSON}" ]; then
            echo "::error::Missing required GitHub Secret: GOOGLE_SERVICE_ACCOUNT_JSON"
            exit 1
          fi

      - name: Write temporary credential file
        shell: bash
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          raw_value = os.environ["GOOGLE_SERVICE_ACCOUNT_JSON"]
          json.loads(raw_value)
          path = Path(os.environ["RUNNER_TEMP"]) / "google-service-account.json"
          path.write_text(raw_value, encoding="utf-8")
          path.chmod(0o600)
          with Path(os.environ["GITHUB_ENV"]).open("a", encoding="utf-8") as handle:
              handle.write(f"GOOGLE_APPLICATION_CREDENTIALS={path}\n")
          PY

      - name: Run validation
        run: |
          python -m compileall -q src
          pytest
          python -m src.workflow_validation

      - name: Resolve execution mode
        id: mode
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            execution="run"
            run_id=""
          else
            execution="${{ inputs.execution }}"
            run_id="${{ inputs.run_id }}"
          fi
          echo "execution=$execution" >> "$GITHUB_OUTPUT"
          echo "run_id=$run_id" >> "$GITHUB_OUTPUT"

      - name: Cool down Google Sheets quota
        shell: bash
        run: |
          echo "Waiting 75 seconds after schema preflight before the workbook health read and write cycle."
          sleep 75

      - name: Calculate verification health
        shell: bash
        run: |
          args=("--${{ steps.mode.outputs.execution }}" "--schema-prevalidated")
          if [ -n "${{ steps.mode.outputs.run_id }}" ]; then
            args+=(--run-id "${{ steps.mode.outputs.run_id }}")
          fi

          stdout_path="$RUNNER_TEMP/verification_health.stdout"
          stderr_path="$RUNNER_TEMP/verification_health.stderr"
          output_path="$RUNNER_TEMP/verification_health.json"

          set +e
          python -m src.verification_health "${args[@]}" >"$stdout_path" 2>"$stderr_path"
          command_status=$?
          set -e

          cat "$stdout_path"
          cat "$stderr_path" >&2
          cp "$stdout_path" "$output_path"

          if [ "$command_status" -ne 0 ]; then
            ERROR_FILE="$stderr_path" python - <<'PY' >> "$output_path"
          import json
          import os
          from pathlib import Path

          text = Path(os.environ["ERROR_FILE"]).read_text(encoding="utf-8", errors="replace")
          lines = [line.strip() for line in text.splitlines() if line.strip()]
          detail = lines[-1] if lines else "Verification health command failed without stderr output."
          error_type = detail.split(":", 1)[0] if ":" in detail else "command_failed"
          print(json.dumps({
              "overall_classification": "not calculated",
              "overall_score": "",
              "status": "failed",
              "error_type": error_type,
              "error_message": detail,
              "history_action": "not written",
              "dashboard_rows_written": 0,
              "sla_breach_count": 0,
              "blocker_counts": {},
              "health_components": [],
          }))
          PY
            echo "::error::Verification health calculation failed after a successful schema preflight. See the traceback and failure detail above."
          fi

          exit "$command_status"

      - name: Write GitHub Step Summary
        if: always()
        shell: bash
        env:
          FINAL_STATUS: ${{ job.status }}
        run: |
          python - <<'PY'
          import os
          from pathlib import Path

          from src.workflow_output import load_json_output

          summary_default = {
              "overall_classification": "not calculated",
              "overall_score": "",
              "sla_breach_count": 0,
              "blocker_counts": {},
              "history_action": "not written",
              "dashboard_rows_written": 0,
              "health_components": [],
              "error_type": "",
              "error_message": "",
          }

          def _safe_count_sum(value):
              if not isinstance(value, dict):
                  return 0
              total = 0
              for count in value.values():
                  try:
                      total += int(count or 0)
                  except (TypeError, ValueError):
                      continue
              return total

          output_path = Path(os.environ["RUNNER_TEMP"]) / "verification_health.json"
          data = load_json_output(
              output_path,
              summary_default,
              required_keys=("overall_classification", "overall_score"),
          )
          components = data.get("health_components") or []
          if not isinstance(components, list):
              components = []

          rows = [
              ("Overall classification", data.get("overall_classification", "not calculated")),
              ("Overall score", data.get("overall_score", "")),
              ("SLA breaches", data.get("sla_breach_count", 0)),
              ("Unresolved blocker rows", _safe_count_sum(data.get("blocker_counts"))),
              ("History action", data.get("history_action", "not written")),
              ("Dashboard rows written", data.get("dashboard_rows_written", 0)),
              ("Final workflow status", os.environ.get("FINAL_STATUS", "unknown")),
          ]

          summary_path = Path(os.environ["GITHUB_STEP_SUMMARY"])
          with summary_path.open("a", encoding="utf-8") as handle:
              handle.write("### Job Tracker Verification Health\n\n")
              handle.write("| Metric | Value |\n")
              handle.write("| --- | ---: |\n")
              for metric, value in rows:
                  handle.write(f"| {metric} | {value} |\n")
              if components:
                  handle.write("\n| Component | Score | Classification |\n")
                  handle.write("| --- | ---: | --- |\n")
                  for component in components:
                      if not isinstance(component, dict):
                          continue
                      handle.write(
                          f"| {component.get('label', '')} | {component.get('score', '')} | "
                          f"{component.get('classification', '')} |\n"
                      )
              error_message = str(data.get("error_message") or "").strip()
              if error_message:
                  error_type = str(data.get("error_type") or "command_failed").strip()
                  safe_detail = error_message.replace("`", "'").replace("\n", " ")
                  handle.write(f"\nFailure type: `{error_type}`\n\n")
                  handle.write(f"Failure detail: `{safe_detail[:1500]}`\n")
          PY
