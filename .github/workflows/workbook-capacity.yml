name: Job Tracker Workbook Capacity

on:
  workflow_dispatch:
    inputs:
      apply_compaction:
        description: "Apply the audited trailing row and column compaction plan"
        required: true
        type: boolean
        default: false
      allow_trim_blank_formatting:
        description: "Approve removal of formatting-only or formatting-unverified trailing grid cells"
        required: true
        type: boolean
        default: false
  schedule:
    - cron: "15 14 1 * *"

permissions:
  contents: read

concurrency:
  group: job-tracker-workbook-capacity
  cancel-in-progress: false

jobs:
  workbook-capacity:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
      GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate required secrets
        shell: bash
        run: |
          if [ -z "${GOOGLE_SHEET_ID}" ]; then
            echo "::error::Missing required GitHub Secret: GOOGLE_SHEET_ID"
            exit 1
          fi
          if [ -z "${GOOGLE_SERVICE_ACCOUNT_JSON}" ]; then
            echo "::error::Missing required GitHub Secret: GOOGLE_SERVICE_ACCOUNT_JSON"
            exit 1
          fi

      - name: Write Google credentials
        shell: bash
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          raw_value = os.environ["GOOGLE_SERVICE_ACCOUNT_JSON"]
          json.loads(raw_value)
          path = Path(os.environ["RUNNER_TEMP"]) / "google-service-account.json"
          path.write_text(raw_value, encoding="utf-8")
          path.chmod(0o600)
          with Path(os.environ["GITHUB_ENV"]).open("a", encoding="utf-8") as handle:
              handle.write(f"GOOGLE_APPLICATION_CREDENTIALS={path}\n")
          PY

      - name: Run focused tests
        run: pytest tests/test_workbook_capacity.py tests/test_workbook_capacity_workflow.py

      - name: Validate live workbook schema
        run: python -m src.schema --validate

      - name: Audit workbook capacity
        if: ${{ github.event_name != 'workflow_dispatch' || !inputs.apply_compaction }}
        shell: bash
        run: |
          set -o pipefail
          python -m src.workbook_capacity --audit --enforce-critical \
            | tee "$RUNNER_TEMP/workbook_capacity.json"

      - name: Apply explicit safe compaction
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.apply_compaction }}
        shell: bash
        env:
          ALLOW_TRIM_BLANK_FORMATTING: ${{ inputs.allow_trim_blank_formatting }}
        run: |
          set -o pipefail
          extra_args=()
          if [ "${ALLOW_TRIM_BLANK_FORMATTING}" = "true" ]; then
            extra_args+=(--allow-trim-blank-formatting)
          fi
          python -m src.workbook_capacity --compact --apply --enforce-critical "${extra_args[@]}" \
            | tee "$RUNNER_TEMP/workbook_capacity.json"

      - name: Upload capacity report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: workbook-capacity-report
          path: ${{ runner.temp }}/workbook_capacity.json
          if-no-files-found: ignore
          retention-days: 30

      - name: Write GitHub Step Summary
        if: always()
        shell: bash
        run: |
          python - <<'PY'
          import os
          from pathlib import Path

          from src.workflow_output import load_json_output

          result = load_json_output(Path(os.environ["RUNNER_TEMP"]) / "workbook_capacity.json")
          audit = result.get("after") or result
          rows = [
              ("Status", result.get("status", "not_run")),
              ("Run mode", result.get("run_mode", "not_run")),
              ("Compaction applied", result.get("applied", False)),
              ("Blank formatting approved", result.get("allow_trim_blank_formatting", False)),
              ("Classification", audit.get("classification", "not_calculated")),
              ("Allocated cells", audit.get("allocated_cells", 0)),
              ("Capacity used", f"{audit.get('capacity_percent', 0)}%"),
              ("Estimated reclaimable cells", audit.get("estimated_reclaimable_cells", 0)),
              (
                  "Reclaimable without formatting approval",
                  audit.get("reclaimable_without_formatting_approval", 0),
              ),
              ("Requests planned", result.get("requests_planned", 0)),
              ("Requests submitted", result.get("requests_submitted", 0)),
              ("Cells reclaimed", result.get("cells_reclaimed", 0)),
              ("Sheets compacted", result.get("sheets_compacted", 0)),
          ]
          with Path(os.environ["GITHUB_STEP_SUMMARY"]).open("a", encoding="utf-8") as handle:
              handle.write("### Workbook Capacity and Grid Safety\n\n")
              handle.write("| Metric | Value |\n")
              handle.write("| --- | ---: |\n")
              for metric, value in rows:
                  handle.write(f"| {metric} | {value} |\n")
              sheets = audit.get("sheets") or []
              if sheets:
                  handle.write(
                      "\n| Sheet | Allocated | Approved target | Reclaimable | Formatting approval | Safe |\n"
                  )
                  handle.write("| --- | ---: | ---: | ---: | --- | --- |\n")
                  for sheet in sheets:
                      allocated = (
                          f"{sheet.get('allocated_rows', 0)} x "
                          f"{sheet.get('allocated_columns', 0)}"
                      )
                      target = (
                          f"{sheet.get('target_rows', 0)} x "
                          f"{sheet.get('target_columns', 0)}"
                      )
                      handle.write(
                          f"| {sheet.get('worksheet_name', '')} | {allocated} | {target} | "
                          f"{sheet.get('estimated_reclaimable_cells', 0)} | "
                          f"{sheet.get('requires_blank_formatting_approval', False)} | "
                          f"{sheet.get('safe_to_compact_with_formatting_approval', False)} |\n"
                      )
              warnings = audit.get("warnings") or []
              if warnings:
                  handle.write("\n#### Manual inspection or approval required\n\n")
                  for warning in warnings:
                      handle.write(f"* {warning}\n")
          PY
