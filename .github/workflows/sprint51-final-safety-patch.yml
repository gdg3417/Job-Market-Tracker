name: Sprint 51 Final Safety Patch

on:
  pull_request:
    branches:
      - main
    types:
      - synchronize

permissions:
  contents: write

jobs:
  patch:
    if: github.event.pull_request.head.ref == 'agent/sprint-51-source-quality-yield'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/sprint-51-source-quality-yield
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Make patch replay-safe
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('scripts/sprint51_final_safety_patch.py')
          text = path.read_text(encoding='utf-8')
          old = '''    count = text.count(old)\n    if count != 1:\n        raise RuntimeError(f"Expected exactly one match in {path}, found {count}: {old[:100]!r}")\n    file_path.write_text(text.replace(old, new, 1), encoding="utf-8")\n'''
          new = '''    count = text.count(old)\n    if count == 0 and new in text:\n        return\n    if count != 1:\n        raise RuntimeError(f"Expected exactly one match in {path}, found {count}: {old[:100]!r}")\n    file_path.write_text(text.replace(old, new, 1), encoding="utf-8")\n'''
          if old not in text:
              raise SystemExit('Unable to make patch script replay-safe')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY

      - name: Apply planned patch
        run: python scripts/sprint51_final_safety_patch.py

      - name: Validate focused behavior
        run: |
          python -m compileall -q src tests
          pytest tests/test_source_quality_hardening.py tests/test_source_quality_workflow.py

      - name: Remove temporary patch script
        run: rm scripts/sprint51_final_safety_patch.py

      - name: Publish validated patch branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Fix Sprint 51 ATS conversion and no-probe safety"
          git push --force origin HEAD:automation/sprint51-final-safety
