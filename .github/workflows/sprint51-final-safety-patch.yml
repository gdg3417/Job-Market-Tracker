name: Sprint 51 Final Safety Patch

on:
  pull_request:
    branches:
      - main
    types:
      - synchronize

permissions:
  contents: read

jobs:
  patch:
    if: github.event.pull_request.head.ref == 'agent/sprint-51-source-quality-yield'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/sprint-51-source-quality-yield

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Apply planned patch
        run: python scripts/sprint51_final_safety_patch.py

      - name: Validate focused behavior
        run: |
          python -m compileall -q src tests
          pytest tests/test_source_quality_hardening.py tests/test_source_quality_workflow.py

      - name: Package validated files
        run: |
          mkdir -p validated-patch/src validated-patch/tests validated-patch/docs validated-patch/.github/workflows
          cp src/source_quality.py validated-patch/src/source_quality.py
          cp src/source_quality_report.py validated-patch/src/source_quality_report.py
          cp tests/test_source_quality_hardening.py validated-patch/tests/test_source_quality_hardening.py
          cp tests/test_source_quality_workflow.py validated-patch/tests/test_source_quality_workflow.py
          cp docs/sprint_51_source_quality_yield.md validated-patch/docs/sprint_51_source_quality_yield.md
          cp .github/workflows/source-quality.yml validated-patch/.github/workflows/source-quality.yml

      - name: Upload validated patch
        uses: actions/upload-artifact@v4
        with:
          name: sprint51-validated-patch
          path: validated-patch
          if-no-files-found: error
          retention-days: 1
