name: Sprint 51 Final Review Fixes

on:
  pull_request:
    branches:
      - main
    types:
      - synchronize

permissions:
  contents: write

jobs:
  patch:
    if: github.event.pull_request.head.ref == 'agent/sprint-51-source-quality-yield'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/sprint-51-source-quality-yield
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Apply final review fixes
        run: |
          python - <<'PY'
          from pathlib import Path

          def replace_once(path_name, old, new):
              path = Path(path_name)
              text = path.read_text(encoding='utf-8')
              if old not in text:
                  raise SystemExit(f'Expected patch target not found in {path_name}')
              path.write_text(text.replace(old, new, 1), encoding='utf-8')

          replace_once(
              'src/source_quality.py',
              '''    if status in {"success", "no_jobs", "no_jobs_found", "no_jobs_extracted", "healthy"}:\n''',
              '''    if status in {"success", "empty", "no_jobs", "no_jobs_found", "no_jobs_extracted", "healthy"}:\n''',
          )
          replace_once(
              'src/source_quality.py',
              '''def _percent(numerator: int, denominator: int) -> float:\n    return round((numerator / denominator) * 100, 1) if denominator else 0.0\n\n\ndef _host(url: Any) -> str:\n''',
              '''def _percent(numerator: int, denominator: int) -> float:\n    return round((numerator / denominator) * 100, 1) if denominator else 0.0\n\n\ndef _optional_number(value: Any) -> float | None:\n    if value in (None, ""):\n        return None\n    try:\n        return float(str(value).replace(",", "").strip())\n    except (TypeError, ValueError):\n        return None\n\n\ndef _host(url: Any) -> str:\n''',
          )
          replace_once(
              'src/source_quality.py',
              '''            score = _number(job.get("potential_priority_score"))\n            if score:\n                metrics.potential_scores.append(score)\n''',
              '''            score = _optional_number(job.get("potential_priority_score"))\n            if score is not None:\n                metrics.potential_scores.append(score)\n''',
          )

          replace_once(
              'src/main.py',
              '''def build_sprint10_run_record(\n''',
              '''def _all_sources_skipped_status(skip_reasons: list[str] | tuple[str, ...]) -> str:\n    reasons = {str(reason or "").strip() for reason in skip_reasons if str(reason or "").strip()}\n    if not reasons or reasons == {"cooldown_active"}:\n        return "all_sources_in_cooldown"\n    return "all_sources_blocked_by_policy"\n\n\ndef build_sprint10_run_record(\n''',
          )
          replace_once(
              'src/main.py',
              '''    summary: dict[str, Any],\n    skipped_sources: int = 0,\n) -> dict[str, Any]:\n''',
              '''    summary: dict[str, Any],\n    skipped_sources: int = 0,\n    skip_reasons: list[str] | tuple[str, ...] = (),\n) -> dict[str, Any]:\n''',
          )
          replace_once(
              'src/main.py',
              '''    if source_count == 0 and skipped_sources:\n        status = "all_sources_in_cooldown"\n''',
              '''    if source_count == 0 and skipped_sources:\n        status = _all_sources_skipped_status(skip_reasons)\n''',
          )
          replace_once(
              'src/main.py',
              '''        "runtime_policy_skips": skipped_sources,\n''',
              '''        "runtime_policy_skips": skipped_sources,\n        "runtime_policy_skip_reasons": sorted({reason for reason in skip_reasons if reason}),\n''',
          )
          replace_once(
              'src/main.py',
              '''            skipped_sources=len(skipped_sources),\n        )\n''',
              '''            skipped_sources=len(skipped_sources),\n            skip_reasons=tuple(item.get("reason", "") for item in skipped_sources),\n        )\n''',
          )
          replace_once(
              'src/main.py',
              '''    if not results and skipped_sources:\n        status = "all_sources_in_cooldown"\n''',
              '''    if not results and skipped_sources:\n        status = _all_sources_skipped_status(\n            tuple(item.get("reason", "") for item in skipped_sources)\n        )\n''',
          )

          path = Path('tests/test_source_quality_hardening.py')
          text = path.read_text(encoding='utf-8')
          if 'from src.main import build_sprint10_run_record\n' not in text:
              text = text.replace(
                  'from pathlib import Path\n\n',
                  'from pathlib import Path\n\nfrom src.main import build_sprint10_run_record\n',
                  1,
              )
          old_assertion = '''    assert 'status = "all_sources_in_cooldown"' in text\n'''
          new_assertions = '''    assert "_all_sources_skipped_status" in text\n    assert '"all_sources_in_cooldown"' in text\n    assert '"all_sources_blocked_by_policy"' in text\n'''
          if old_assertion in text:
              text = text.replace(old_assertion, new_assertions, 1)
          additions = '''\n\ndef test_empty_static_run_resets_prior_failure_streak():\n    runs = [\n        {\n            "source_type": "static_page",\n            "source_name": "static_page:Example Co",\n            "status": "failed",\n            "finished_at": "2026-07-01T12:00:00Z",\n            "notes": "url=https://example.com/jobs; http_status=404",\n        },\n        {\n            "source_type": "static_page",\n            "source_name": "static_page:Example Co",\n            "status": "empty",\n            "finished_at": "2026-07-05T12:00:00Z",\n            "notes": "url=https://example.com/jobs; http_status=200",\n        },\n        {\n            "source_type": "static_page",\n            "source_name": "static_page:Example Co",\n            "status": "failed",\n            "finished_at": "2026-07-10T12:00:00Z",\n            "notes": "url=https://example.com/jobs; http_status=404",\n        },\n    ]\n    count = prior_failure_observations(\n        runs,\n        company_name="Example Co",\n        source_url="https://example.com/jobs",\n        classification=PERMANENT_404,\n        as_of=datetime(2026, 7, 14, tzinfo=UTC),\n    )\n    assert count == 1\n\n\ndef test_zero_potential_scores_are_included_in_source_average():\n    rows = build_source_yield_report(\n        jobs=[\n            {"job_key": "job0", "company": "Example Co", "potential_priority_score": "0"},\n            {"job_key": "job80", "company": "Example Co", "potential_priority_score": "80"},\n        ],\n        job_sources=[\n            {\n                "source_key": "s0",\n                "job_key": "job0",\n                "company": "Example Co",\n                "source_primary": "static_page",\n                "source_type": "static_page",\n                "source_url": "https://example.com/jobs",\n                "first_seen_date": "2026-07-10",\n            },\n            {\n                "source_key": "s80",\n                "job_key": "job80",\n                "company": "Example Co",\n                "source_primary": "static_page",\n                "source_type": "static_page",\n                "source_url": "https://example.com/jobs",\n                "first_seen_date": "2026-07-11",\n            },\n        ],\n        rejected_jobs=[],\n        weeks=4,\n        as_of=date(2026, 7, 14),\n    )\n    row = next(item for item in rows if item.group_type == "static_company_source")\n    assert row.average_potential_score == 40.0\n\n\ndef test_static_summary_distinguishes_cooldown_from_policy_blocks():\n    common = {\n        "jobs_found": 0,\n        "source_count": 0,\n        "source_failures": 0,\n        "search_count": 0,\n        "low_confidence_count": 0,\n        "summary": {},\n        "skipped_sources": 1,\n    }\n    cooldown = build_sprint10_run_record(\n        **common,\n        skip_reasons=("cooldown_active",),\n    )\n    blocked = build_sprint10_run_record(\n        **common,\n        skip_reasons=("configuration_change_required",),\n    )\n    assert cooldown["status"] == "all_sources_in_cooldown"\n    assert blocked["status"] == "all_sources_blocked_by_policy"\n    assert "configuration_change_required" in blocked["notes"]\n'''
          markers = [
              'def test_empty_static_run_resets_prior_failure_streak():',
              'def test_zero_potential_scores_are_included_in_source_average():',
              'def test_static_summary_distinguishes_cooldown_from_policy_blocks():',
          ]
          if not any(marker in text for marker in markers):
              text = text.rstrip() + additions + '\n'
          path.write_text(text, encoding='utf-8')
          PY

      - name: Validate review fixes
        run: |
          python -m compileall -q src tests
          pytest tests/test_source_quality_hardening.py tests/test_source_quality.py tests/test_source_quality_report.py

      - name: Publish validated review-fix branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/source_quality.py src/main.py tests/test_source_quality_hardening.py
          git commit -m "Fix final Sprint 51 review findings"
          git push --force origin HEAD:automation/sprint51-final-review-fixes
