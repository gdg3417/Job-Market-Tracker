name: Sprint 34 Source Export

on:
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  export-source:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Package source
        shell: bash
        run: |
          zip -qr "$RUNNER_TEMP/job-market-tracker-source.zip" . \
            -x '.git/*' \
            -x '.venv/*' \
            -x '__pycache__/*' \
            -x '*.pyc'

      - name: Upload source
        uses: actions/upload-artifact@v4
        with:
          name: sprint34-source
          path: ${{ runner.temp }}/job-market-tracker-source.zip
          retention-days: 1
