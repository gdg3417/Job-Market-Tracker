name: Sprint 26 Validation

on:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements.txt
      - name: Run tests and capture output
        shell: bash
        run: |
          set +e
          pytest -q > pytest-output.txt 2>&1
          status=$?
          echo "$status" > pytest-status.txt
          exit 0
      - name: Upload pytest output
        uses: actions/upload-artifact@v4
        with:
          name: sprint-26-pytest-output
          path: |
            pytest-output.txt
            pytest-status.txt
      - name: Enforce test result
        shell: bash
        run: test "$(cat pytest-status.txt)" -eq 0
