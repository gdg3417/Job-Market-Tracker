name: Sprint 51 Legacy Guard Patch

on:
  pull_request:
    branches:
      - main
    types:
      - synchronize

permissions:
  contents: write

jobs:
  patch:
    if: github.event.pull_request.head.ref == 'agent/sprint-51-source-quality-yield'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: agent/sprint-51-source-quality-yield
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Apply final guard corrections
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('src/source_quality.py')
          text = path.read_text(encoding='utf-8')
          old = '''    writes = {"source_audit_rows_written": 0, "source_yield_rows_written": 0}\n    if write_report:\n'''
          new = '''    if approved_company_ids and not probe_sources:\n        raise ValueError("Approved cleanup requires live source probes.")\n\n    writes = {"source_audit_rows_written": 0, "source_yield_rows_written": 0}\n    if write_report:\n'''
          if new not in text:
              if old not in text:
                  raise SystemExit('Unable to insert legacy run guard')
              text = text.replace(old, new, 1)
          old = '''    if approved and not args.write_report:\n        raise SystemExit("Approved configuration updates require --write-report so the audit evidence is persisted.")\n    result = run_source_quality(\n'''
          new = '''    if approved and not args.write_report:\n        raise SystemExit("Approved configuration updates require --write-report so the audit evidence is persisted.")\n    if approved and args.skip_live_probes:\n        raise SystemExit("Approved cleanup requires live source probes.")\n    result = run_source_quality(\n'''
          if new not in text:
              if old not in text:
                  raise SystemExit('Unable to insert legacy CLI guard')
              text = text.replace(old, new, 1)
          path.write_text(text, encoding='utf-8')

          path = Path('src/source_quality_report.py')
          text = path.read_text(encoding='utf-8')
          duplicate = '''    if approved and args.skip_live_probes:\n        raise SystemExit("Approved cleanup requires live source probes.")\n    if approved and args.skip_live_probes:\n        raise SystemExit("Approved cleanup requires live source probes.")\n'''
          single = '''    if approved and args.skip_live_probes:\n        raise SystemExit("Approved cleanup requires live source probes.")\n'''
          if duplicate not in text:
              raise SystemExit('Expected duplicated report CLI guard was not found')
          path.write_text(text.replace(duplicate, single, 1), encoding='utf-8')

          path = Path('tests/test_source_quality_hardening.py')
          text = path.read_text(encoding='utf-8')
          if '    run_source_quality,\n' not in text:
              text = text.replace('    probe_source,\n)', '    probe_source,\n    run_source_quality,\n)', 1)
          test = '''\n\ndef test_legacy_no_probe_cleanup_is_rejected_before_writes():\n    class FakeClient:\n        def read_records_with_row_numbers(self, worksheet_name):\n            return [(2, _company())]\n\n        def read_records(self, worksheet_name):\n            return []\n\n    try:\n        run_source_quality(\n            probe_sources=False,\n            write_report=True,\n            approved_company_ids={"example"},\n            sheet_client=FakeClient(),\n        )\n    except ValueError as exc:\n        assert "requires live source probes" in str(exc)\n    else:\n        raise AssertionError("Expected legacy no-probe cleanup to be rejected")\n'''
          if 'def test_legacy_no_probe_cleanup_is_rejected_before_writes():' not in text:
              text = text.rstrip() + test + '\n'
          path.write_text(text, encoding='utf-8')
          PY

      - name: Validate final guard behavior
        run: |
          python -m compileall -q src tests
          pytest tests/test_source_quality_hardening.py tests/test_source_quality_workflow.py

      - name: Publish validated correction branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/source_quality.py src/source_quality_report.py tests/test_source_quality_hardening.py
          git commit -m "Guard legacy Sprint 51 cleanup path"
          git push --force origin HEAD:automation/sprint51-legacy-guard
