name: Job Tracker Daily Run

on:
  workflow_dispatch:
    inputs:
      replay_mode:
        description: Gmail replay scope
        required: false
        default: normal
        type: choice
        options:
          - normal
          - failed_only
          - selected
      message_ids:
        description: Comma-separated Gmail message IDs for selected replay
        required: false
        default: ""
        type: string
      force_reprocess_selected:
        description: Reprocess explicitly selected messages even when already complete
        required: false
        default: false
        type: boolean
      max_message_attempts:
        description: Quarantine isolated failures after this many attempts
        required: false
        default: "3"
        type: string
  schedule:
    - cron: "30 11 * * *"
    - cron: "30 12 * * *"

permissions:
  contents: read

concurrency:
  group: job-tracker-workbook-writes
  queue: max
  cancel-in-progress: false

jobs:
  daily-run:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      GOOGLE_SHEET_ID: ${{ secrets.GOOGLE_SHEET_ID }}
      GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
      GMAIL_CLIENT_CONFIG_SECRET: ${{ secrets.GMAIL_CLIENT_CONFIG }}
      GMAIL_TOKEN_JSON_SECRET: ${{ secrets.GMAIL_TOKEN_JSON }}
      GMAIL_LABEL_NAME: Job Tracker
      GMAIL_MAX_RESULTS: "50"
      JOB_TRACKER_DRY_RUN: "false"
      STATIC_REJECT_WARN_THRESHOLD: "25"
      STATIC_REJECT_FAIL_THRESHOLD: "75"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate required secrets
        shell: bash
        run: |
          if [ -z "${GOOGLE_SHEET_ID}" ]; then
            echo "::error::Missing required GitHub Secret: GOOGLE_SHEET_ID"
            exit 1
          fi
          if [ -z "${GOOGLE_SERVICE_ACCOUNT_JSON}" ]; then
            echo "::error::Missing required GitHub Secret: GOOGLE_SERVICE_ACCOUNT_JSON"
            exit 1
          fi

      - name: Write temporary credential files
        id: credentials
        shell: bash
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          runner_temp = Path(os.environ["RUNNER_TEMP"])
          github_env = Path(os.environ["GITHUB_ENV"])
          github_output = Path(os.environ["GITHUB_OUTPUT"])

          def write_json_secret(secret_env_name: str, output_env_name: str, filename: str, required: bool = False) -> bool:
              raw_value = os.environ.get(secret_env_name, "")
              if not raw_value.strip():
                  if required:
                      raise ValueError(f"Missing required secret {secret_env_name}")
                  return False
              json.loads(raw_value)
              path = runner_temp / filename
              path.write_text(raw_value, encoding="utf-8")
              path.chmod(0o600)
              with github_env.open("a", encoding="utf-8") as handle:
                  handle.write(f"{output_env_name}={path}\n")
              return True

          write_json_secret(
              "GOOGLE_SERVICE_ACCOUNT_JSON",
              "GOOGLE_APPLICATION_CREDENTIALS",
              "google-service-account.json",
              required=True,
          )
          gmail_client_ready = write_json_secret(
              "GMAIL_CLIENT_CONFIG_SECRET",
              "GMAIL_CLIENT_CONFIG",
              "gmail-client-config.json",
          )
          gmail_token_ready = write_json_secret(
              "GMAIL_TOKEN_JSON_SECRET",
              "GMAIL_TOKEN_JSON",
              "gmail-token.json",
          )
          with github_output.open("a", encoding="utf-8") as handle:
              handle.write(f"gmail_ready={'true' if gmail_client_ready and gmail_token_ready else 'false'}\n")
          PY

      - name: Check daily completion lock
        id: daily_gate
        shell: bash
        run: |
          set -o pipefail
          python -m src.daily_run_gate --check --event-name "${{ github.event_name }}" | tee "$RUNNER_TEMP/daily_gate.json"
          python - <<'PY'
          import json
          import os
          import re
          from pathlib import Path

          path = Path(os.environ["RUNNER_TEMP"]) / "daily_gate.json"
          text = path.read_text(encoding="utf-8").strip()
          match = re.search(r"\{.*\}\s*$", text, re.S)
          data = json.loads(match.group(0) if match else text)
          with Path(os.environ["GITHUB_OUTPUT"]).open("a", encoding="utf-8") as handle:
              handle.write(f"should_run={'true' if data.get('should_run') else 'false'}\n")
              handle.write(f"gate_result={data.get('gate_result', 'unknown')}\n")
              handle.write(f"central_date={data.get('central_date', '')}\n")
          if not data.get("should_run"):
              if data.get("gate_result") == "skipped_before_earliest_central_time":
                  print("Scheduled invocation skipped because it is before 06:30 AM Central.")
              else:
                  print("Scheduled invocation skipped because this Central calendar date already has a successful completion record.")
          PY

      - name: Run tests
        if: steps.daily_gate.outputs.should_run == 'true'
        run: pytest

      - name: Migrate and validate workbook schema
        if: steps.daily_gate.outputs.should_run == 'true'
        shell: bash
        run: |
          set -o pipefail
          python -m src.schema --migrate | tee "$RUNNER_TEMP/schema_validation.json"

      - name: Record workflow validation
        if: steps.daily_gate.outputs.should_run == 'true'
        shell: bash
        run: |
          set -o pipefail
          python -m src.workflow_validation | tee "$RUNNER_TEMP/workflow_validation.json"

      - name: Run static career pages
        if: steps.daily_gate.outputs.should_run == 'true'
        shell: bash
        run: |
          set -o pipefail
          python -m src.main --static-pages-smoke-test | tee "$RUNNER_TEMP/static_pages.json"
          python - <<'PY'
          import os
          from pathlib import Path

          from src.workflow_output import load_json_output

          data = load_json_output(Path(os.environ["RUNNER_TEMP"]) / "static_pages.json")
          if not data:
              print("::error::Static career pages did not produce valid JSON output.")
              raise SystemExit(1)
          upsert = data.get("upsert_summary") or {}
          records_seen = int(upsert.get("records_seen") or data.get("jobs_found") or 0)
          accepted = int(upsert.get("jobs_created") or 0) + int(upsert.get("duplicates_matched") or 0)
          rejected = int(upsert.get("jobs_rejected") or max(0, records_seen - accepted))
          warn_threshold = int(os.environ.get("STATIC_REJECT_WARN_THRESHOLD", "25"))
          fail_threshold = int(os.environ.get("STATIC_REJECT_FAIL_THRESHOLD", "75"))

          if rejected >= fail_threshold:
              print(f"::error::Static career pages produced {rejected} rejected records, threshold {fail_threshold}.")
              raise SystemExit(1)
          if rejected >= warn_threshold:
              print(f"::warning::Static career pages produced {rejected} rejected records, threshold {warn_threshold}.")
          PY

      - name: Run Gmail ingestion
        id: gmail_ingestion
        if: steps.daily_gate.outputs.should_run == 'true' && steps.credentials.outputs.gmail_ready == 'true'
        shell: bash
        env:
          REPLAY_MODE: ${{ inputs.replay_mode || 'normal' }}
          SELECTED_MESSAGE_IDS: ${{ inputs.message_ids }}
          FORCE_REPROCESS_SELECTED: ${{ inputs.force_reprocess_selected || false }}
          MAX_MESSAGE_ATTEMPTS: ${{ inputs.max_message_attempts || '3' }}
        run: |
          set +e
          args=(--max-message-attempts "${MAX_MESSAGE_ATTEMPTS:-3}")
          replay_mode="${REPLAY_MODE:-normal}"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ "$replay_mode" = "failed_only" ]; then
              args+=(--retry-failed-only)
            elif [ "$replay_mode" = "selected" ]; then
              raw_ids="${SELECTED_MESSAGE_IDS:-}"
              if [ -z "${raw_ids// }" ]; then
                echo "::error::Selected Gmail replay requires at least one exact message ID."
                exit 1
              fi
              IFS=',' read -ra selected_ids <<< "$raw_ids"
              for message_id in "${selected_ids[@]}"; do
                trimmed="$(echo "$message_id" | xargs)"
                if [ -z "$trimmed" ]; then
                  continue
                fi
                if [[ ! "$trimmed" =~ ^[A-Za-z0-9_-]+$ ]]; then
                  echo "::error::Invalid Gmail message ID: only letters, numbers, underscores, and hyphens are allowed."
                  exit 1
                fi
                args+=(--message-id "$trimmed")
              done
              if [ "$FORCE_REPROCESS_SELECTED" = "true" ]; then
                args+=(--force-reprocess-selected)
              fi
            fi
          fi

          python -m src.gmail_ingestion --run "${args[@]}" | tee "$RUNNER_TEMP/gmail_alerts.json"
          ingestion_status=${PIPESTATUS[0]}
          python - <<'PY'
          import os
          from pathlib import Path

          from src.workflow_output import load_json_output

          path = Path(os.environ["RUNNER_TEMP"]) / "gmail_alerts.json"
          data = load_json_output(
              path,
              {
                  "status": "command_failed",
                  "processing_failures": 1,
                  "failed_messages": 1,
                  "quarantined_messages": 0,
                  "backlog_remaining": 0,
                  "ingestion_run_recorded": False,
              },
          )
          backlog = int(data.get("backlog_remaining") or 0)
          failed = int(data.get("failed_messages") or 0)
          quarantined = int(data.get("quarantined_messages") or 0)
          status = str(data.get("status") or "unknown")
          with Path(os.environ["GITHUB_OUTPUT"]).open("a", encoding="utf-8") as handle:
              handle.write(f"failed_messages={failed}\n")
              handle.write(f"quarantined_messages={quarantined}\n")
              handle.write(f"ingestion_status={status}\n")
              handle.write(f"systemic_failure_category={data.get('systemic_failure_category', '')}\n")
              handle.write(f"systemic_failure_stage={data.get('systemic_failure_stage', '')}\n")
              handle.write(f"ingestion_run_recorded={'true' if data.get('ingestion_run_recorded') else 'false'}\n")
          if status == "command_failed":
              print("::error::Gmail ingestion exited before producing a valid JSON summary. Review the Gmail ingestion log above for the original exception.")
              raise SystemExit(1)
          if backlog:
              print(f"::warning::Gmail backlog remains after this run: {backlog} message(s).")
          if failed:
              print(f"::warning::Gmail processing left {failed} retryable message failure(s); the daily completion record will be withheld.")
          if quarantined:
              print(f"::warning::Gmail quarantined {quarantined} isolated message failure(s) for manual review.")
          if data.get("systemic_failure_category"):
              print(
                  "::error::Systemic Gmail failure: "
                  f"{data.get('systemic_failure_category')} at {data.get('systemic_failure_stage') or 'unknown_stage'}."
              )
          if not data.get("ingestion_run_recorded"):
              print("::error::The Gmail ingestion run record was not written.")
          PY
          validation_status=$?
          if [ "$ingestion_status" -ne 0 ]; then
            exit "$ingestion_status"
          fi
          exit "$validation_status"

      - name: Skip Gmail ingestion
        if: steps.daily_gate.outputs.should_run == 'true' && steps.credentials.outputs.gmail_ready != 'true'
        shell: bash
        run: |
          cat > "$RUNNER_TEMP/gmail_alerts.json" <<'JSON'
          {"status":"skipped","messages_fetched":0,"pages_fetched":0,"messages_already_processed":0,"new_messages_processed":0,"processing_failures":0,"failed_messages":0,"quarantined_messages":0,"backlog_remaining":0,"jobs_accepted":0,"alerts_rejected":0,"ingestion_run_recorded":false}
          JSON
          echo "Skipping optional Gmail alert ingestion because Gmail secrets are not configured."

      - name: Run Greenhouse, Lever, and lifecycle
        if: steps.daily_gate.outputs.should_run == 'true'
        shell: bash
        run: |
          set -o pipefail
          python -m src.main --job-upsert-smoke-test | tee "$RUNNER_TEMP/job_upsert.json"

      - name: Refresh generated presentation surfaces
        if: steps.daily_gate.outputs.should_run == 'true'
        shell: bash
        run: |
          set -o pipefail
          python -m src.presentation_refresh \
            --refresh \
            --source-run "daily-run" \
            | tee "$RUNNER_TEMP/dashboard.json"

      - name: Mark successful daily completion
        if: >-
          steps.daily_gate.outputs.should_run == 'true' &&
          (steps.credentials.outputs.gmail_ready != 'true' ||
          (steps.gmail_ingestion.outputs.failed_messages == '0' &&
          steps.gmail_ingestion.outputs.ingestion_status != 'command_failed' &&
          steps.gmail_ingestion.outputs.ingestion_status != 'systemic_failure' &&
          steps.gmail_ingestion.outputs.ingestion_status != 'run_record_failure'))
        shell: bash
        run: |
          python -m src.daily_run_gate --mark-success --gate-result "${{ steps.daily_gate.outputs.gate_result }}" | tee "$RUNNER_TEMP/daily_completion.json"

      - name: Record daily workflow attempt
        id: daily_attempt
        if: always() && steps.daily_gate.outputs.should_run == 'true'
        continue-on-error: true
        shell: bash
        env:
          PRIOR_JOB_STATUS: ${{ job.status }}
          GMAIL_STATUS: ${{ steps.gmail_ingestion.outputs.ingestion_status }}
          GMAIL_FAILED: ${{ steps.gmail_ingestion.outputs.failed_messages }}
          GMAIL_QUARANTINED: ${{ steps.gmail_ingestion.outputs.quarantined_messages }}
        run: |
          attempt_status="${PRIOR_JOB_STATUS:-unknown}"
          gmail_failed="${GMAIL_FAILED:-0}"
          gmail_quarantined="${GMAIL_QUARANTINED:-0}"
          gmail_status="${GMAIL_STATUS:-not_run}"
          if [ "$gmail_failed" != "0" ] || [ "$gmail_status" = "systemic_failure" ] || [ "$gmail_status" = "run_record_failure" ] || [ "$gmail_status" = "command_failed" ]; then
            attempt_status="incomplete"
          fi
          set -o pipefail
          python -m src.daily_run_gate \
            --mark-attempt \
            --status "$attempt_status" \
            --gate-result "${{ steps.daily_gate.outputs.gate_result }}" \
            --gmail-status "$gmail_status" \
            --gmail-failed "$gmail_failed" \
            --gmail-quarantined "$gmail_quarantined" \
            | tee "$RUNNER_TEMP/daily_attempt.json"

      - name: Write GitHub Step Summary
        if: always()
        shell: bash
        env:
          FINAL_STATUS: ${{ job.status }}
          DAILY_GATE_RESULT: ${{ steps.daily_gate.outputs.gate_result }}
        run: |
          python - <<'PY'
          import os
          from pathlib import Path

          from src.workflow_output import load_json_output

          temp = Path(os.environ["RUNNER_TEMP"])
          static = load_json_output(temp / "static_pages.json")
          gmail = load_json_output(
              temp / "gmail_alerts.json",
              {"status": "not_run", "failed_messages": 0, "quarantined_messages": 0},
          )
          dashboard = load_json_output(temp / "dashboard.json")
          completion = load_json_output(temp / "daily_completion.json")
          attempt = load_json_output(temp / "daily_attempt.json")

          static_upsert = static.get("upsert_summary") or {}
          static_records_seen = int(static_upsert.get("records_seen") or static.get("jobs_found") or 0)
          static_accepted = int(static_upsert.get("jobs_created") or 0) + int(static_upsert.get("duplicates_matched") or 0)
          static_rejected = int(static_upsert.get("jobs_rejected") or max(0, static_records_seen - static_accepted))

          rows = [
              ("Daily run gate result", os.environ.get("DAILY_GATE_RESULT") or "not_checked"),
              ("Static jobs found", static.get("jobs_found", 0)),
              ("Static jobs rejected", static_rejected),
              ("Gmail ingestion status", gmail.get("status", "not_run")),
              ("Gmail replay mode", gmail.get("replay_mode", "normal")),
              ("Gmail messages fetched", gmail.get("messages_fetched", 0)),
              ("Gmail messages already processed", gmail.get("messages_already_processed", 0)),
              ("Gmail messages successfully processed", gmail.get("successfully_processed", gmail.get("new_messages_processed", 0))),
              ("Gmail processing failures", gmail.get("processing_failures", 0)),
              ("Gmail retryable failures", gmail.get("failed_messages", 0)),
              ("Gmail quarantined messages", gmail.get("quarantined_messages", 0)),
              ("Gmail backlog remaining", gmail.get("backlog_remaining", 0)),
              ("Gmail systemic failure category", gmail.get("systemic_failure_category", "") or "none"),
              ("Gmail systemic failure stage", gmail.get("systemic_failure_stage", "") or "none"),
              ("Gmail ingestion run recorded", "yes" if gmail.get("ingestion_run_recorded") else "no"),
              ("Gmail diagnostics recorded", "yes" if gmail.get("diagnostics_recorded", True) else "no"),
              ("Gmail jobs accepted", gmail.get("jobs_accepted", 0)),
              ("Gmail alerts rejected", gmail.get("alerts_rejected", 0)),
              ("Daily attempt recorded", "yes" if attempt.get("status") == "recorded" else "no"),
              ("Successful daily completion recorded", "yes" if completion.get("status") == "success" else "no"),
              ("Generated surfaces succeeded", dashboard.get("surfaces_succeeded", 0)),
              ("Generated surfaces failed", dashboard.get("surfaces_failed", 0)),
              ("Surface status written", "yes" if dashboard.get("surface_status_written") else "no"),
              ("Dashboard rows written", dashboard.get("dashboard_rows_written", 0)),
              ("Digest rows written", dashboard.get("digest_rows_written", 0)),
              ("Final status", os.environ.get("FINAL_STATUS", "unknown")),
          ]

          summary_path = Path(os.environ["GITHUB_STEP_SUMMARY"])
          with summary_path.open("a", encoding="utf-8") as handle:
              handle.write("### Job Tracker Daily Run\n\n")
              handle.write("| Metric | Value |\n")
              handle.write("| --- | ---: |\n")
              for metric, value in rows:
                  handle.write(f"| {metric} | {value} |\n")
              if gmail.get("status") == "skipped":
                  handle.write("\nGmail ingestion skipped because optional Gmail secrets are not configured.\n")
              elif gmail.get("status") == "command_failed":
                  handle.write("\nGmail ingestion failed before producing its structured summary.\n")
              elif gmail.get("systemic_failure_category"):
                  handle.write(
                      "\nSystemic Gmail failure detected: "
                      f"{gmail.get('systemic_failure_category')} at {gmail.get('systemic_failure_stage') or 'unknown_stage'}.\n"
                  )
              if int(gmail.get("failed_messages") or 0):
                  handle.write("\nSuccessful daily completion was withheld because retryable Gmail failures remain.\n")
              if int(gmail.get("quarantined_messages") or 0):
                  handle.write("\nQuarantined Gmail messages require manual review but will not be replayed automatically.\n")
              if int(dashboard.get("surfaces_failed") or 0):
                  handle.write("\nOne or more generated surfaces failed. Review the presentation refresh output.\n")
          PY
